<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Форма обратной связи</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="container">
        <h1 id="page-title">Форма обратной связи</h1>
        <p class="subtitle">Заполните поля и нажмите «Отправить»</p>

        <form id="contact-form" novalidate>
            <div class="field">
                <label for="name">Имя</label>
                <input type="text" id="name" name="name" placeholder="Введите имя" required>
            </div>
            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="example@mail.ru" required>
            </div>
            <div class="field">
                <label for="message">Сообщение</label>
                <textarea id="message" name="message" rows="4" placeholder="Ваше сообщение" required></textarea>
            </div>
            <button type="submit" id="submit-btn">Отправить</button>
        </form>

        <p id="result-message" class="result hidden" role="status"></p>
    </main>
    <script src="js/app.js"></script>
</body>
</html>
